name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Install ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install ffmpeg -y --no-progress

      - name: Setup ffmpeg + ffprobe binaries (macOS)
        if: matrix.platform == 'macos-latest'
        run: bash scripts/download-ffmpeg.sh --ci

      - name: Setup ffmpeg + ffprobe binaries (Windows)
        if: matrix.platform == 'windows-latest'
        run: bash scripts/download-ffmpeg.sh
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_PUBLIC_POSTHOG_PROJECT_TOKEN }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: '七月播放器 v__VERSION__'
          releaseBody: |
            七月播放器 1.1.2 新增修改：
            - 新增 AI 实时音频识别翻译：播放器倍速按钮左侧增加 AI 按钮，可识别当前视频音频并翻译。
            - 优化 AI 翻译显示方式：AI 翻译结果直接替换为播放器场景字幕，不再显示左侧黑色翻译框。
            - 新增 AI 模块语音识别配置：支持填写 ASR API Key、模型和兼容 /audio/transcriptions 的接口地址。
            - 新增宠物模块：侧边栏设置下方增加宠物入口，可管理常驻宠物与宠物功能。
            - 新增多宠物选择：支持 Built-in Pet、Orchestrator、Fixer、Snoopy、Clippy、Tux、Wall-E、Dobby 等 OpenPets 宠物。
            - 新增官方宠物功能模块：支持提醒、虚拟宠物、专注伙伴、饮水提醒、早晚日常、情绪自检、发布伙伴、魔法 8 号球和幸运饼干开关。
            - 优化常驻宠物：宠物在应用内常驻显示，可自由拖拽移动，不再带黑色控制框。
            - 修复宠物插件设置持久化：关闭全部宠物功能后，重启应用不会自动恢复默认开启。
            - 发布前清理播放器调试日志，并完成前端构建与 Rust 后端检查。
          includeUpdaterJson: true
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          gh release edit "v${VERSION}" --draft=false --prerelease=false

      - name: Upload updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node <<'NODE'
          const fs = require("node:fs");
          const { execFileSync } = require("node:child_process");

          const version = require("./package.json").version;
          const tag = `v${version}`;
          const release = JSON.parse(execFileSync("gh", [
            "release",
            "view",
            tag,
            "--json",
            "assets,publishedAt",
          ], { encoding: "utf8" }));

          const assets = new Map(release.assets.map((asset) => [asset.name, asset.url]));
          const download = (name) => {
            const url = assets.get(name);
            if (!url) throw new Error(`Missing release asset: ${name}`);
            return url;
          };
          fs.rmSync("release-signatures", { recursive: true, force: true });
          fs.mkdirSync("release-signatures");
          const signature = (name) => {
            execFileSync("gh", [
              "release",
              "download",
              tag,
              "--pattern",
              name,
              "--dir",
              "release-signatures",
            ], { stdio: "inherit" });
            return fs.readFileSync(`release-signatures/${name}`, "utf8").trim();
          };

          const macUrl = download("_universal.app.tar.gz");
          const macSig = signature("_universal.app.tar.gz.sig");
          const winMsiUrl = download(`_${version}_x64_zh-CN.msi`);
          const winMsiSig = signature(`_${version}_x64_zh-CN.msi.sig`);
          const winNsisUrl = download(`_${version}_x64-setup.exe`);
          const winNsisSig = signature(`_${version}_x64-setup.exe.sig`);

          const latest = {
            version,
            notes: [
              "七月播放器 1.1.2 新增修改：",
              "- 新增 AI 实时音频识别翻译：播放器倍速按钮左侧增加 AI 按钮，可识别当前视频音频并翻译。",
              "- 优化 AI 翻译显示方式：AI 翻译结果直接替换为播放器场景字幕，不再显示左侧黑色翻译框。",
              "- 新增 AI 模块语音识别配置：支持填写 ASR API Key、模型和兼容 /audio/transcriptions 的接口地址。",
              "- 新增宠物模块：侧边栏设置下方增加宠物入口，可管理常驻宠物与宠物功能。",
              "- 新增多宠物选择：支持 Built-in Pet、Orchestrator、Fixer、Snoopy、Clippy、Tux、Wall-E、Dobby 等 OpenPets 宠物。",
              "- 新增官方宠物功能模块：支持提醒、虚拟宠物、专注伙伴、饮水提醒、早晚日常、情绪自检、发布伙伴、魔法 8 号球和幸运饼干开关。",
              "- 优化常驻宠物：宠物在应用内常驻显示，可自由拖拽移动，不再带黑色控制框。",
              "- 修复宠物插件设置持久化：关闭全部宠物功能后，重启应用不会自动恢复默认开启。",
              "- 发布前清理播放器调试日志，并完成前端构建与 Rust 后端检查。"
            ].join("\n"),
            pub_date: release.publishedAt,
            platforms: {
              "darwin-aarch64": { signature: macSig, url: macUrl },
              "darwin-x86_64": { signature: macSig, url: macUrl },
              "darwin-aarch64-app": { signature: macSig, url: macUrl },
              "darwin-x86_64-app": { signature: macSig, url: macUrl },
              "windows-x86_64": { signature: winMsiSig, url: winMsiUrl },
              "windows-x86_64-msi": { signature: winMsiSig, url: winMsiUrl },
              "windows-x86_64-nsis": { signature: winNsisSig, url: winNsisUrl },
            },
          };
          fs.writeFileSync("latest.json", JSON.stringify(latest, null, 2));
          NODE
          gh release upload "v${VERSION}" latest.json --clobber
