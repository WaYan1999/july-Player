name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Install ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install ffmpeg -y --no-progress

      - name: Setup ffmpeg + ffprobe binaries (macOS)
        if: matrix.platform == 'macos-latest'
        run: bash scripts/download-ffmpeg.sh --ci

      - name: Setup ffmpeg + ffprobe binaries (Windows)
        if: matrix.platform == 'windows-latest'
        run: bash scripts/download-ffmpeg.sh
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_PUBLIC_POSTHOG_PROJECT_TOKEN }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: '七月播放器 v__VERSION__'
          releaseBody: |
            七月播放器 1.1.1 新增修改：
            - 新增 Windows 无边框窗口模式，移除系统白色标题栏。
            - 新增柔和自定义标题栏，标题栏颜色跟随深色/浅色主题。
            - 新增自定义窗口按钮：支持最小化、最大化/还原和关闭。
            - 优化标题栏按钮反馈：默认低对比，鼠标悬停时显示柔和反馈。
            - 优化七月播放器 logo，去除图标四周白色背景，并同步桌面打包图标。
          includeUpdaterJson: true
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          gh release edit "v${VERSION}" --draft=false --prerelease=false

      - name: Upload updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node <<'NODE'
          const fs = require("node:fs");
          const { execFileSync } = require("node:child_process");

          const version = require("./package.json").version;
          const tag = `v${version}`;
          const release = JSON.parse(execFileSync("gh", [
            "release",
            "view",
            tag,
            "--json",
            "assets,publishedAt",
          ], { encoding: "utf8" }));

          const assets = new Map(release.assets.map((asset) => [asset.name, asset.url]));
          const download = (name) => {
            const url = assets.get(name);
            if (!url) throw new Error(`Missing release asset: ${name}`);
            return url;
          };
          fs.rmSync("release-signatures", { recursive: true, force: true });
          fs.mkdirSync("release-signatures");
          const signature = (name) => {
            execFileSync("gh", [
              "release",
              "download",
              tag,
              "--pattern",
              name,
              "--dir",
              "release-signatures",
            ], { stdio: "inherit" });
            return fs.readFileSync(`release-signatures/${name}`, "utf8").trim();
          };

          const macUrl = download("_universal.app.tar.gz");
          const macSig = signature("_universal.app.tar.gz.sig");
          const winMsiUrl = download(`_${version}_x64_zh-CN.msi`);
          const winMsiSig = signature(`_${version}_x64_zh-CN.msi.sig`);
          const winNsisUrl = download(`_${version}_x64-setup.exe`);
          const winNsisSig = signature(`_${version}_x64-setup.exe.sig`);

          const latest = {
            version,
            notes: [
              "七月播放器 1.1.1 新增修改：",
              "- 新增 Windows 无边框窗口模式，移除系统白色标题栏。",
              "- 新增柔和自定义标题栏，标题栏颜色跟随深色/浅色主题。",
              "- 新增自定义窗口按钮：支持最小化、最大化/还原和关闭。",
              "- 优化标题栏按钮反馈：默认低对比，鼠标悬停时显示柔和反馈。",
              "- 优化七月播放器 logo，去除图标四周白色背景，并同步桌面打包图标。"
            ].join("\n"),
            pub_date: release.publishedAt,
            platforms: {
              "darwin-aarch64": { signature: macSig, url: macUrl },
              "darwin-x86_64": { signature: macSig, url: macUrl },
              "darwin-aarch64-app": { signature: macSig, url: macUrl },
              "darwin-x86_64-app": { signature: macSig, url: macUrl },
              "windows-x86_64": { signature: winMsiSig, url: winMsiUrl },
              "windows-x86_64-msi": { signature: winMsiSig, url: winMsiUrl },
              "windows-x86_64-nsis": { signature: winNsisSig, url: winNsisUrl },
            },
          };
          fs.writeFileSync("latest.json", JSON.stringify(latest, null, 2));
          NODE
          gh release upload "v${VERSION}" latest.json --clobber
