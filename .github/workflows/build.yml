name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Install ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install ffmpeg -y --no-progress

      - name: Setup ffmpeg + ffprobe binaries (macOS)
        if: matrix.platform == 'macos-latest'
        run: bash scripts/download-ffmpeg.sh --ci

      - name: Setup ffmpeg + ffprobe binaries (Windows)
        if: matrix.platform == 'windows-latest'
        run: bash scripts/download-ffmpeg.sh
        shell: bash

      - name: Setup offline ASR resources
        run: bash scripts/download-asr.sh
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_PUBLIC_POSTHOG_PROJECT_TOKEN }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: '七月播放器 v__VERSION__'
          releaseBody: |
            七月播放器 1.1.4 新增修改：
            - 修复多国语言字幕 AI 翻译：西班牙语、英语、法语等外语字幕会优先直接翻译成设置中的目标语言，默认中文。
            - 优化 AI 翻译按钮逻辑：有字幕时翻译当前字幕，没有字幕时才回退到离线 ASR 语音识别翻译。
            - 优化字幕自动选择：字幕关闭时点击 AI 翻译，会自动选择一条非中文字幕作为翻译源。
            - 修复桌面宠物进入桌面后消失、应用卡死的问题：桌面宠物窗口改为异步创建，避免 Windows WebView2 死锁。
            - 优化桌面宠物状态同步：窗口打开成功后才隐藏播放器内宠物，失败会回滚；桌面小窗异常关闭后主窗口会自动恢复常驻宠物。
            - 优化桌面宠物窗口权限和轻量化加载，避免桌面宠物小窗触发主播放器更新检查。
            - 新增宠物游乐场：宠物总览页增加寻宝、跳跃训练、惊喜礼物 3 个真实小游戏。
            - 新增宠物小游戏数值系统：支持代币奖励/消耗、XP 奖励、宠物食物/能量/玩耍/亲密度变化。
            - 新增宠物小游戏冷却与每日次数：每个小游戏都有独立冷却、每日上限和明确失败反馈。
            - 新增宠物连击成长：10 分钟内连续游玩可叠加连击，获得额外 XP，跨天或间隔过久会重置。
            - 优化宠物操作反馈：成功、冷却、次数用完、代币不足、状态不足都会通过提示和宠物气泡反馈。
            - 优化常驻宠物轮盘：点击宠物可打开喂养、玩耍、抚摸、休息轮盘，并实时更新宠物状态。
            - 优化宠物界面布局：宠物命名、成长、商店、模块、AI 成长、桌面宠物和反馈区域更清晰。
            - 新增宠物一次性自定义名称、宠物商店、等级解锁和购买逻辑。
            - 新增宠物 AI 成长授权：用户允许后，宠物可使用 AI 模块配置进行自我成长，并有每日预算限制。
            - 新增桌面宠物模式：宠物可离开播放器进入独立桌面小窗口，并显示自定义宠物名称。
            - 修复笔记内容渲染安全问题：新增 HTML 白名单清洗，降低笔记 XSS 风险。
            - 优化视频协议读取：本地视频请求按范围读取，避免一次性读入大视频造成内存压力。
            - 优化 AI API 地址校验和错误反馈。
            - 修复 Rust clippy 检查问题，并补充字幕语言识别测试。
            - 发布前完成前端构建、Rust 检查、clippy、单元测试和依赖安全审核。
          includeUpdaterJson: true
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          gh release edit "v${VERSION}" --draft=false --prerelease=false

      - name: Upload updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node <<'NODE'
          const fs = require("node:fs");
          const { execFileSync } = require("node:child_process");

          const version = require("./package.json").version;
          const tag = `v${version}`;
          const release = JSON.parse(execFileSync("gh", [
            "release",
            "view",
            tag,
            "--json",
            "assets,publishedAt",
          ], { encoding: "utf8" }));

          const assets = new Map(release.assets.map((asset) => [asset.name, asset.url]));
          const findAsset = (suffix) => {
            const exact = assets.get(suffix);
            if (exact) return { name: suffix, url: exact };
            const match = release.assets.find((asset) => asset.name.endsWith(suffix));
            if (!match) {
              throw new Error(`Missing release asset ending with: ${suffix}`);
            }
            return match;
          };
          fs.rmSync("release-signatures", { recursive: true, force: true });
          fs.mkdirSync("release-signatures");
          const signature = (name) => {
            execFileSync("gh", [
              "release",
              "download",
              tag,
              "--pattern",
              name,
              "--dir",
              "release-signatures",
            ], { stdio: "inherit" });
            return fs.readFileSync(`release-signatures/${name}`, "utf8").trim();
          };

          const macAsset = findAsset("_universal.app.tar.gz");
          const macSigAsset = findAsset("_universal.app.tar.gz.sig");
          const winMsiAsset = findAsset(`_${version}_x64_zh-CN.msi`);
          const winMsiSigAsset = findAsset(`_${version}_x64_zh-CN.msi.sig`);
          const winNsisAsset = findAsset(`_${version}_x64-setup.exe`);
          const winNsisSigAsset = findAsset(`_${version}_x64-setup.exe.sig`);

          const macUrl = macAsset.url;
          const macSig = signature(macSigAsset.name);
          const winMsiUrl = winMsiAsset.url;
          const winMsiSig = signature(winMsiSigAsset.name);
          const winNsisUrl = winNsisAsset.url;
          const winNsisSig = signature(winNsisSigAsset.name);

          const latest = {
            version,
            notes: [
              "七月播放器 1.1.4 新增修改：",
              "- 修复多国语言字幕 AI 翻译：西班牙语、英语、法语等外语字幕会优先直接翻译成设置中的目标语言，默认中文。",
              "- 优化 AI 翻译按钮逻辑：有字幕时翻译当前字幕，没有字幕时才回退到离线 ASR 语音识别翻译。",
              "- 优化字幕自动选择：字幕关闭时点击 AI 翻译，会自动选择一条非中文字幕作为翻译源。",
              "- 修复桌面宠物进入桌面后消失、应用卡死的问题：桌面宠物窗口改为异步创建，避免 Windows WebView2 死锁。",
              "- 优化桌面宠物状态同步：窗口打开成功后才隐藏播放器内宠物，失败会回滚；桌面小窗异常关闭后主窗口会自动恢复常驻宠物。",
              "- 优化桌面宠物窗口权限和轻量化加载，避免桌面宠物小窗触发主播放器更新检查。",
              "- 新增宠物游乐场：宠物总览页增加寻宝、跳跃训练、惊喜礼物 3 个真实小游戏。",
              "- 新增宠物小游戏数值系统：支持代币奖励/消耗、XP 奖励、宠物食物/能量/玩耍/亲密度变化。",
              "- 新增宠物小游戏冷却与每日次数：每个小游戏都有独立冷却、每日上限和明确失败反馈。",
              "- 新增宠物连击成长：10 分钟内连续游玩可叠加连击，获得额外 XP，跨天或间隔过久会重置。",
              "- 优化宠物操作反馈：成功、冷却、次数用完、代币不足、状态不足都会通过提示和宠物气泡反馈。",
              "- 优化常驻宠物轮盘：点击宠物可打开喂养、玩耍、抚摸、休息轮盘，并实时更新宠物状态。",
              "- 优化宠物界面布局：宠物命名、成长、商店、模块、AI 成长、桌面宠物和反馈区域更清晰。",
              "- 新增宠物一次性自定义名称、宠物商店、等级解锁和购买逻辑。",
              "- 新增宠物 AI 成长授权：用户允许后，宠物可使用 AI 模块配置进行自我成长，并有每日预算限制。",
              "- 新增桌面宠物模式：宠物可离开播放器进入独立桌面小窗口，并显示自定义宠物名称。",
              "- 修复笔记内容渲染安全问题：新增 HTML 白名单清洗，降低笔记 XSS 风险。",
              "- 优化视频协议读取：本地视频请求按范围读取，避免一次性读入大视频造成内存压力。",
              "- 优化 AI API 地址校验和错误反馈。",
              "- 修复 Rust clippy 检查问题，并补充字幕语言识别测试。",
              "- 发布前完成前端构建、Rust 检查、clippy、单元测试和依赖安全审核。"
            ].join("\n"),
            pub_date: release.publishedAt,
            platforms: {
              "darwin-aarch64": { signature: macSig, url: macUrl },
              "darwin-x86_64": { signature: macSig, url: macUrl },
              "darwin-aarch64-app": { signature: macSig, url: macUrl },
              "darwin-x86_64-app": { signature: macSig, url: macUrl },
              "windows-x86_64": { signature: winMsiSig, url: winMsiUrl },
              "windows-x86_64-msi": { signature: winMsiSig, url: winMsiUrl },
              "windows-x86_64-nsis": { signature: winNsisSig, url: winNsisUrl },
            },
          };
          fs.writeFileSync("latest.json", JSON.stringify(latest, null, 2));
          NODE
          gh release upload "v${VERSION}" latest.json --clobber
