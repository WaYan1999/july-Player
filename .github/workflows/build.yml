name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Remove previous release assets for this version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          gh release delete "v${VERSION}" --yes || true

  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Install ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install ffmpeg -y --no-progress

      - name: Setup ffmpeg + ffprobe binaries (macOS)
        if: matrix.platform == 'macos-latest'
        run: bash scripts/download-ffmpeg.sh --ci

      - name: Setup ffmpeg + ffprobe binaries (Windows)
        if: matrix.platform == 'windows-latest'
        run: bash scripts/download-ffmpeg.sh
        shell: bash

      - name: Setup offline ASR resources
        run: bash scripts/download-asr.sh
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_PUBLIC_POSTHOG_PROJECT_TOKEN }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: '七月播放器 v__VERSION__'
          releaseBody: |
            七月播放器 v__VERSION__ 新增修改：
            - 修复书签页课程列表变形，恢复单列横向大卡片排版。
            - 修复全屏播放时底部控制条挤压、贴边和右侧按钮裁切问题。
            - 优化切换视频卡顿问题，高清转码改为选择清晰度后按需触发。
            - 字幕解析改为按需懒加载，减少切课和切换视频时的性能压力。
            - 整体配色切换为更柔和的蓝灰主题，降低黑白对比过硬的问题。
            - 新增 JulyRes 构建产物上传流程，方便后台人工核对并发布 latest.json。
            - 发布前完成前端构建和 TypeScript 检查。
          includeUpdaterJson: true
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          gh release edit "v${VERSION}" --draft=false --prerelease=false

      - name: Upload updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node <<'NODE'
          const fs = require("node:fs");
          const { execFileSync } = require("node:child_process");

          const version = require("./package.json").version;
          const tag = `v${version}`;
          const release = JSON.parse(execFileSync("gh", [
            "release",
            "view",
            tag,
            "--json",
            "assets,publishedAt",
          ], { encoding: "utf8" }));

          const assets = new Map(release.assets.map((asset) => [asset.name, asset.url]));
          const findAsset = (suffix) => {
            const exact = assets.get(suffix);
            if (exact) return { name: suffix, url: exact };
            const match = release.assets.find((asset) => asset.name.endsWith(suffix));
            if (!match) {
              throw new Error(`Missing release asset ending with: ${suffix}`);
            }
            return match;
          };
          fs.rmSync("release-signatures", { recursive: true, force: true });
          fs.mkdirSync("release-signatures");
          const signature = (name) => {
            execFileSync("gh", [
              "release",
              "download",
              tag,
              "--pattern",
              name,
              "--dir",
              "release-signatures",
            ], { stdio: "inherit" });
            return fs.readFileSync(`release-signatures/${name}`, "utf8").trim();
          };

          const macAsset = findAsset("_universal.app.tar.gz");
          const macSigAsset = findAsset("_universal.app.tar.gz.sig");
          const winMsiAsset = findAsset(`_${version}_x64_zh-CN.msi`);
          const winMsiSigAsset = findAsset(`_${version}_x64_zh-CN.msi.sig`);
          const winNsisAsset = findAsset(`_${version}_x64-setup.exe`);
          const winNsisSigAsset = findAsset(`_${version}_x64-setup.exe.sig`);

          const macUrl = macAsset.url;
          const macSig = signature(macSigAsset.name);
          const winMsiUrl = winMsiAsset.url;
          const winMsiSig = signature(winMsiSigAsset.name);
          const winNsisUrl = winNsisAsset.url;
          const winNsisSig = signature(winNsisSigAsset.name);

          const latest = {
            version,
            notes: [
              `七月播放器 ${version} 新增修改：`,
              "- 修复书签页课程列表变形，恢复单列横向大卡片排版。",
              "- 修复全屏播放时底部控制条挤压、贴边和右侧按钮裁切问题。",
              "- 优化切换视频卡顿问题，高清转码改为选择清晰度后按需触发。",
              "- 字幕解析改为按需懒加载，减少切课和切换视频时的性能压力。",
              "- 整体配色切换为更柔和的蓝灰主题，降低黑白对比过硬的问题。",
              "- 新增 JulyRes 构建产物上传流程，方便后台人工核对并发布 latest.json。",
              "- 发布前完成前端构建和 TypeScript 检查。",
            ].join("\n"),
            pub_date: release.publishedAt,
            platforms: {
              "darwin-aarch64": { signature: macSig, url: macUrl },
              "darwin-x86_64": { signature: macSig, url: macUrl },
              "darwin-aarch64-app": { signature: macSig, url: macUrl },
              "darwin-x86_64-app": { signature: macSig, url: macUrl },
              "windows-x86_64": { signature: winMsiSig, url: winMsiUrl },
              "windows-x86_64-msi": { signature: winMsiSig, url: winMsiUrl },
              "windows-x86_64-nsis": { signature: winNsisSig, url: winNsisUrl },
            },
          };
          fs.writeFileSync("latest.json", JSON.stringify(latest, null, 2));
          NODE
          gh release upload "v${VERSION}" latest.json --clobber

      - name: Upload player artifacts to JulyRes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JULYRES_PLAYER_RELEASE_TOKEN: ${{ secrets.JULYRES_PLAYER_RELEASE_TOKEN }}
          JULYRES_SITE_URL: https://julyres.top
        run: |
          if [ -z "${JULYRES_PLAYER_RELEASE_TOKEN}" ]; then
            echo "::error::Missing required GitHub Actions secret: JULYRES_PLAYER_RELEASE_TOKEN"
            echo "::error::Add it in Settings > Secrets and variables > Actions before cutting a release."
            exit 1
          fi

          VERSION="$(node -p "require('./package.json').version")"
          rm -rf release-artifacts
          mkdir -p release-artifacts
          gh release download "v${VERSION}" \
            --dir release-artifacts \
            --pattern "*.msi" \
            --pattern "*.msi.sig" \
            --pattern "*-setup.exe" \
            --pattern "*-setup.exe.sig" \
            --pattern "*.app.tar.gz" \
            --pattern "*.app.tar.gz.sig"
          npm run upload:release-artifacts -- \
            --release-dir release-artifacts \
            --version "${VERSION}" \
            --notes "修复书签课程卡片变形和全屏控制条布局，优化切换视频卡顿、字幕懒加载、蓝灰主题与 JulyRes 发布上传流程。" \
            --panel-title "七月播放器 ${VERSION}" \
            --panel-description "本次版本优化 <b>视频切换性能</b>、<b>全屏控制条</b>、<b>书签排版</b>、<b>字幕懒加载</b> 与 <b>蓝灰主题</b>，上传后请在后台人工核对并发布到 latest.json。" \
            --require-complete
